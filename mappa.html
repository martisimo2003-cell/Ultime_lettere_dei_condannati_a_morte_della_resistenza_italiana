  <div id="map"> </div>

  <script>
    var map = L.map('map').setView([44.5, 10.5], 6);

    L.tileLayer(
      'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
       maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }
    ).addTo(map);

    var gustav = L.polyline([
    [41.23, 13.57], 
    [41.50, 13.83], 
    [41.73, 14.10], 
    [41.88, 14.60], 
    [42.22, 14.54]  
    ], {
        color: 'red',
        weight: 4,
        opacity: 0.8
    }).addTo(map);

    gustav.bindPopup(
        "<b>Linea Gustav</b><br>" +
        "Principale linea difensiva tedesca nell'Italia centrale, superata dagli Alleati nel maggio 1944."
    );



    var gotica = L.polyline([
    [44.03, 10.15], 
    [44.08, 10.45], 
    [44.20, 11.25], 
    [44.07, 11.75], 
    [43.85, 12.45], 
    [43.91, 12.91]  
    ], {
     color: 'blue',
        weight: 4,
        opacity: 0.8
    }).addTo(map);

    gotica.bindPopup(
        "<b>Linea Gotica</b><br>" +
        "Principale linea difensiva tedesca nell'Italia centro-settentrionale, superata dagli Alleati nella primavera del 1945."
    );

    function creaPopup(lat, lng, colore, titolo, contenuto) {

        L.circleMarker([lat, lng], {
            radius: 8,
            color: colore,
            fillColor: colore,
            fillOpacity: 0.8,
            weight: 2
        })
        .addTo(map)
        .bindPopup(
            "<div class='popup-esecuzione'>" +
            "<h3>" + titolo + "</h3>" +
            contenuto +
            "</div>"
        );
    }

creaPopup(
    41.8680,
    12.4234,
    "blue",
    "Spalti del Forte Bravetta",
    "<strong>Mario de Martis</strong><br>3 giugno 1944<br>" +
    "<a href='lettere/mario_de_martis.xml'>Vai alla risorsa</a>",
    "roma.html"
);

creaPopup(
    41.8618,
    12.5116,
    "red",
    "Fosse Ardeatine<br>",
    "<strong>Alberto Marchesi</strong><br>24 marzo 1944<br>" +
    "<a href='lettere/alberto_marchesi.xml'>Vai alla risorsa</a><br><br>" +
    "<strong>Sabato Martelli Castaldi</strong><br>24 marzo 1944<br>" +
    "<a href='lettere/sabato_martelli_castaldi.xml'>Vai alla risorsa</a><br><br>" +
    "<strong>Giuseppe Cordero Lanza di Montezemolo</strong><br>24 marzo 1944<br>" +
    "<a href='lettere/giuseppe_cordero_lanza_di_montezemolo'>Vai alla risorsa</a><br><br>" +
    "<strong>Simone Simoni</strong><br>24 marzo 1944<br>" +
    "<a href='lettere/simone_simoni.xml'>Vai alla risorsa</a>",
    "roma.html"
);


creaPopup(
    45.0703,
    7.6869,
    "red",
    "Poligono del Martinetto",
    "<strong>Eusebio Giambone</strong><br>5 aprile 1944<br>" +
    "<a href='lettere/eusebio_giambone.xml'>Vai alla risorsa</a>",
    "torino.html"
);

creaPopup(
    45.0703,
    7.7080, // le coordinate del luogo sono state leggermente modificate in modo da permettere di cliccare entrambi i pop-up
    "blue",
    "Poligono del Martinetto",
    "<strong>Pietro Ferreira</strong><br>23 gennaio 1945<br>" +
    "<a href='pietro_ferreira.html'>Vai alla risorsa</a><br><br>" +
    "<strong>Ferruccio Valobra</strong><br>22 settembre 1944<br>" +
    "<a href='lettere/ferruccio_valobra.xml'>Vai alla risorsa</a>",
    "torino.html"
);


creaPopup(
    45.4905,
    9.2218,
    "blue",
    "Piazzale Loreto",
    "<strong>Giulio Casiraghi</strong><br>10 agosto 1944<br>" +
    "<a href='lettere/giulio_casiraghi.xml'>Vai alla risorsa</a><br><br>" +
    "<strong>Domenico Fiorani</strong><br>10 agosto 1944<br>" +
    "<a href='lettere/domenico_fiorani.xml'>Vai alla risorsa</a><br><br>" +
    "<strong>Umberto Fogagnolo</strong><br>10 agosto 1944<br>" +
    "<a href='lettere/umberto_fogagnolo.xml'>Vai alla risorsa</a>",
    "milano.html"
);


creaPopup(
    44.4048,
    8.9521,
    "blue",
    "Forte San Giuliano",
    "<strong>Aleandro Longhi</strong><br>29 luglio 1944<br>" +
    "<a href='lettere/aleandro_longhi.xml'>Vai alla risorsa</a>",
    "genova.html"
);


creaPopup(
    44.3845,
    7.5427,
    "blue",
    "Cuneo",
    "<strong>Maria Luisa Alessi</strong><br>26 novembre 1944<br>"+
    "<a href='lettere/maria_luisa_alessi.xml'>Vai alla risorsa</a><br><br>"+
    "<strong>Attilio Martinetto</strong><br>25 aprile 1945<br>"+
    "<a href='lettere/attilio_martinetto.xml'>Vai alla risorsa</a>",
    "cuneo.html"
);

creaPopup(
    44.3088,
    8.4818,
    "blue",
    "Fortezza del Priamar",
    "<strong>Paola Garelli</strong><br>1 novembre 1944<br>" +
    "<a href='lettere/paola_garelli.xml'>Vai alla risorsa</a><br><br>" +
    "<strong>Franca Lanzone</strong><br>1 novembre 1944<br>" +
    "<a href='lettere/franca_lanzone.xml'>Vai alla risorsa</a>",
    "savona.html"
);


creaPopup(
    43.8429,
    10.5030,
    "blue",
    "Porta Elisa",
    "<strong>Aldo Mei</strong><br>4 agosto 1944<br>" +
    "<a href='lettere/aldo_mei.xml'>Vai alla risorsa</a>",
    "lucca.html"

creaPopup(
    46.0711,

    "blue",
    "Cimitero di Udine",

    "<a href='lettere/luciano_pradolin.xml'>Vai alla risorsa</a>",
    "udine.html"
);


creaPopup(
    44.3338,
    10.8358,
    "blue",
    "Carceri di Pavullo",
    "<strong>Irma Marchiani</strong><br>26 novembre 1944<br>" +
    "<a href='lettere/irma_marchiani.xml'>Vai alla risorsa</a>",
    "pavullo.html"
);

var legend = L.control({position: "bottomright"});

legend.onAdd = function () {

    var div = L.DomUtil.create("div", "legend");

    div.innerHTML =
    "<h4>Luoghi di esecuzione</h4>" +
    "<i class='legenda-rosso'></i> Prima del 18 maggio 1944 (caduta della linea gustav, in rosso)<br>" +
    "<i class='legenda-blu'></i> Dal 18 maggio 1944 (caduta della line agustav, in rosso) alla caduta della Linea Gotica (in blu)";
    return div; 

};

legend.addTo(map);
  </script>
